<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCart AI - Intelligent Product Curation</title>
    <meta name="description"
        content="SmartCart AI - Intelligent Product Curating & Price Analysis System with AI Chatbot powered by Sarvam AI">
    <link rel="stylesheet" href="/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="light-mode">
    <!-- Navbar -->
    <nav class="navbar glass">
        <div class="logo">
            <i class="fa-solid fa-cart-shopping"></i> SmartCart <span class="accent">AI</span>
        </div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search products...">
            <button id="searchBtn"><i class="fa-solid fa-search"></i></button>
        </div>
        <div class="nav-controls">
            <button id="themeToggle" class="icon-btn"><i class="fa-solid fa-moon"></i></button>
        </div>
    </nav>

    <div class="container">
        <!-- Sidebar Filters -->
        <aside class="sidebar glass">
            <h3>Filters</h3>

            <div class="filter-group">
                <label>Category</label>
                <select id="categoryFilter">
                    <option value="All">All Categories</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Mobiles">Mobiles</option>
                    <option value="Laptops">Laptops</option>
                    <option value="Fashion">Fashion</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Price Range (₹)</label>
                <div class="range-inputs">
                    <span>₹0</span>
                    <input type="range" id="priceRange" min="0" max="300000" step="1000" value="300000">
                    <span id="priceValue">₹3,00,000</span>
                </div>
            </div>

            <div class="filter-group">
                <label>Minimum Rating</label>
                <div class="rating-stars filter-rating" id="ratingFilter">
                    <i class="fa-solid fa-star" data-value="1"></i>
                    <i class="fa-solid fa-star" data-value="2"></i>
                    <i class="fa-solid fa-star" data-value="3"></i>
                    <i class="fa-solid fa-star" data-value="4"></i>
                    <i class="fa-solid fa-star" data-value="5"></i>
                </div>
                <input type="hidden" id="ratingValue" value="0">
            </div>

            <div class="filter-group">
                <label>Sort By</label>
                <select id="sortFilter">
                    <option value="">Recommended</option>
                    <option value="price_asc">Price: Low to High</option>
                    <option value="price_desc">Price: High to Low</option>
                    <option value="rating_desc">Highest Rated</option>
                </select>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div id="loading" class="loading-spinner hidden">
                <div class="spinner"></div>
            </div>
            <div id="productGrid" class="product-grid">
                <!-- Products injected via JS -->
            </div>
        </main>
    </div>

    <!-- Price Analysis Modal -->
    <div id="chartModal" class="modal hidden">
        <div class="modal-content glass">
            <span class="close-modal">&times;</span>
            <h2 id="chartModalTitle">Price Analysis</h2>
            <div class="chart-container">
                <canvas id="priceChart"></canvas>
            </div>
            <div class="analysis-insights">
                <p>Lowest Price: <span id="lowestPriceVal" class="accent-text"></span></p>
                <p>Best Time to Buy: <span id="bestTimeVal" class="accent-text">Right Now!</span></p>
            </div>
        </div>
    </div>

    <!-- Floating Chatbot -->
    <div class="chatbot-container glass" id="chatbot">
        <div class="chat-header">
            <h3><i class="fa-solid fa-robot"></i> AI Assistant</h3>
            <button id="toggleChat"><i class="fa-solid fa-chevron-down"></i></button>
        </div>
        <div class="chat-body hidden" id="chatBody">
            <div class="messages" id="chatMessages">
                <div class="message bot">
                    Hello! I'm your AI shopping assistant 🛒. You can type or <b>tap the mic</b> to talk to me! Ask
                    about credit card offers, EMI breakdowns, or product comparisons.
                </div>
            </div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="Type or use mic...">
                <button id="micBtn" class="mic-btn" title="Hold to record voice"><i
                        class="fa-solid fa-microphone"></i></button>
                <button id="sendChat"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/app.js"></script>
</body>

</html>

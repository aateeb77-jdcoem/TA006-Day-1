<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCart AI – Login</title>
    <meta name="description" content="Sign in or create an account to access SmartCart AI">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ═══════════════════════════════════════════════
           RESET & BASE
           ═══════════════════════════════════════════════ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #0a0a1a;
            color: #e2e8f0;
        }

        /* ═══════════════════════════════════════════════
           ANIMATED BACKGROUND – Floating Orbs
           ═══════════════════════════════════════════════ */
        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 8s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #6366f1, #4f46e5);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
            animation-duration: 12s;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #8b5cf6, #7c3aed);
            bottom: -80px;
            right: -60px;
            animation-delay: -3s;
            animation-duration: 10s;
        }

        .orb-3 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, #06b6d4, #0891b2);
            top: 50%;
            left: 60%;
            animation-delay: -5s;
            animation-duration: 14s;
        }

        .orb-4 {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, #f97316, #ea580c);
            top: 20%;
            right: 20%;
            animation-delay: -2s;
            animation-duration: 9s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            25% {
                transform: translate(30px, -40px) scale(1.05);
            }

            50% {
                transform: translate(-20px, 20px) scale(0.95);
            }

            75% {
                transform: translate(15px, 30px) scale(1.02);
            }
        }

        /* Grid Lines Background */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(99, 102, 241, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.05) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(99, 102, 241, 0.6);
            border-radius: 50%;
            animation: rise linear infinite;
        }

        @keyframes rise {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        /* ═══════════════════════════════════════════════
           LOGIN CARD
           ═══════════════════════════════════════════════ */
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 1rem;
        }

        .login-card {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow:
                0 0 60px rgba(99, 102, 241, 0.15),
                0 25px 50px rgba(0, 0, 0, 0.4);
            animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(40px);
        }

        @keyframes cardIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo */
        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            margin-bottom: 0.75rem;
            animation: iconPulse 3s ease-in-out infinite;
        }

        @keyframes iconPulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4);
            }

            50% {
                box-shadow: 0 0 0 12px rgba(99, 102, 241, 0);
            }
        }

        .brand h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e2e8f0, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand p {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }

        /* Tab Toggle */
        .tab-toggle {
            display: flex;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 1.75rem;
        }

        .tab-btn {
            flex: 1;
            padding: 0.65rem;
            border: none;
            background: transparent;
            color: #94a3b8;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.35);
        }

        /* Forms */
        .form-section {
            display: none;
            animation: fadeSlideIn 0.4s ease forwards;
        }

        .form-section.active {
            display: block;
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateX(15px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .input-group {
            margin-bottom: 1.25rem;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.75rem;
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.15);
            border-radius: 12px;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .input-group input::placeholder {
            color: #475569;
        }

        .input-group .input-icon {
            position: absolute;
            bottom: 0.85rem;
            left: 0.9rem;
            color: #6366f1;
            font-size: 0.9rem;
        }

        /* Buttons */
        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* Shimmer effect on button */
        .btn-submit::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(transparent,
                    rgba(255, 255, 255, 0.08),
                    transparent);
            transform: rotate(45deg);
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%) rotate(45deg);
            }

            100% {
                transform: translateX(100%) rotate(45deg);
            }
        }

        .btn-skip {
            display: block;
            width: 100%;
            margin-top: 0.75rem;
            padding: 0.75rem;
            background: transparent;
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            color: #94a3b8;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-skip:hover {
            border-color: rgba(148, 163, 184, 0.4);
            color: #e2e8f0;
            background: rgba(30, 41, 59, 0.4);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 1.25rem 0;
            color: #475569;
            font-size: 0.8rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(99, 102, 241, 0.15);
        }

        /* Error/Success messages */
        .msg {
            text-align: center;
            font-size: 0.85rem;
            margin-top: 1rem;
            padding: 0.6rem;
            border-radius: 8px;
            display: none;
        }

        .msg.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .msg.success {
            display: block;
            background: rgba(16, 185, 129, 0.1);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 1.75rem;
            }
        }
    </style>
</head>

<body>

    <!-- Animated Background -->
    <div class="bg-canvas">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>
    <div class="grid-bg"></div>
    <div class="particles" id="particles"></div>

    <!-- Login Card -->
    <div class="login-wrapper">
        <div class="login-card">
            <!-- Brand -->
            <div class="brand">
                <div class="brand-icon"><i class="fa-solid fa-cart-shopping"></i></div>
                <h1>SmartCart AI</h1>
                <p>Your intelligent shopping companion</p>
            </div>

            <!-- Tab Toggle -->
            <div class="tab-toggle">
                <button class="tab-btn active" id="tabSignIn" onclick="switchTab('signin')">Sign In</button>
                <button class="tab-btn" id="tabSignUp" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <!-- Sign In Form -->
            <div class="form-section active" id="signinForm">
                <form onsubmit="handleSignIn(event)">
                    <div class="input-group">
                        <label>Email</label>
                        <i class="fa-solid fa-envelope input-icon"></i>
                        <input type="email" id="loginEmail" placeholder="you@example.com" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-submit">
                        <i class="fa-solid fa-right-to-bracket"></i> Sign In
                    </button>
                </form>

                <div class="divider">or</div>
                <button class="btn-skip" onclick="skipLogin()">
                    Skip for now <i class="fa-solid fa-arrow-right"></i>
                </button>

                <div class="msg" id="signinMsg"></div>
            </div>

            <!-- Sign Up Form -->
            <div class="form-section" id="signupForm">
                <form onsubmit="handleSignUp(event)">
                    <div class="input-group">
                        <label>Full Name</label>
                        <i class="fa-solid fa-user input-icon"></i>
                        <input type="text" id="signupName" placeholder="John Doe" required>
                    </div>
                    <div class="input-group">
                        <label>Email</label>
                        <i class="fa-solid fa-envelope input-icon"></i>
                        <input type="email" id="signupEmail" placeholder="you@example.com" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="signupPassword" placeholder="Min 6 characters" minlength="6"
                            required>
                    </div>
                    <button type="submit" class="btn-submit">
                        <i class="fa-solid fa-user-plus"></i> Create Account
                    </button>
                </form>

                <div class="divider">or</div>
                <button class="btn-skip" onclick="skipLogin()">
                    Skip for now <i class="fa-solid fa-arrow-right"></i>
                </button>

                <div class="msg" id="signupMsg"></div>
            </div>
        </div>
    </div>

    <script>
        // ─── Floating Particles ───────────────────────
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (6 + Math.random() * 10) + 's';
            p.style.animationDelay = Math.random() * 8 + 's';
            p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
            particlesContainer.appendChild(p);
        }

        // ─── Tab Switching ────────────────────────────
        function switchTab(tab) {
            const signinForm = document.getElementById('signinForm');
            const signupForm = document.getElementById('signupForm');
            const tabSignIn = document.getElementById('tabSignIn');
            const tabSignUp = document.getElementById('tabSignUp');

            if (tab === 'signin') {
                signinForm.classList.add('active');
                signupForm.classList.remove('active');
                tabSignIn.classList.add('active');
                tabSignUp.classList.remove('active');
            } else {
                signupForm.classList.add('active');
                signinForm.classList.remove('active');
                tabSignUp.classList.add('active');
                tabSignIn.classList.remove('active');
            }
        }

        // ─── Sign In ─────────────────────────────────
        async function handleSignIn(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const msgEl = document.getElementById('signinMsg');

            try {
                const resp = await fetch('/api/auth/signin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await resp.json();

                if (data.success) {
                    msgEl.className = 'msg success';
                    msgEl.textContent = 'Welcome back! Redirecting...';
                    localStorage.setItem('smartcart_user', JSON.stringify(data.user));
                    setTimeout(() => window.location.href = '/dashboard', 800);
                } else {
                    msgEl.className = 'msg error';
                    msgEl.textContent = data.error || 'Invalid credentials.';
                }
            } catch (err) {
                msgEl.className = 'msg error';
                msgEl.textContent = 'Connection error. Is the server running?';
            }
        }

        // ─── Sign Up ─────────────────────────────────
        async function handleSignUp(e) {
            e.preventDefault();
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const msgEl = document.getElementById('signupMsg');

            try {
                const resp = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await resp.json();

                if (data.success) {
                    msgEl.className = 'msg success';
                    msgEl.textContent = 'Account created! Redirecting...';
                    localStorage.setItem('smartcart_user', JSON.stringify(data.user));
                    setTimeout(() => window.location.href = '/dashboard', 800);
                } else {
                    msgEl.className = 'msg error';
                    msgEl.textContent = data.error || 'Signup failed.';
                }
            } catch (err) {
                msgEl.className = 'msg error';
                msgEl.textContent = 'Connection error. Is the server running?';
            }
        }

        // ─── Skip Login ──────────────────────────────
        function skipLogin() {
            localStorage.setItem('smartcart_user', JSON.stringify({ name: 'Guest', email: 'guest@smartcart.ai', guest: true }));
            window.location.href = '/dashboard';
        }
    </script>
</body>

</html>
